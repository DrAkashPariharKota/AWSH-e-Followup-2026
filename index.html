<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0e7490">
<title>Asha Wellness - Patient Manager</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:Arial,sans-serif;background:#f0fafa;color:#0c4a6e;min-height:100vh;}
.screen{display:none;min-height:100vh;background:#f0fafa;}
.screen.active{display:block;}
.hdr{padding:18px 20px 14px;display:flex;align-items:center;background:#0e7490;color:#fff;}
.hdr-blue{background:#0e7490;}.hdr-orange{background:#d97706;}.hdr-green{background:#059669;}.hdr-amber{background:#b45309;}
.back-btn{background:rgba(255,255,255,0.25);border:none;color:#fff;font-size:22px;border-radius:10px;width:40px;height:40px;cursor:pointer;margin-right:12px;}
.hdr-title{font-size:20px;font-weight:bold;}
.card{background:#fff;border-radius:16px;padding:18px;margin-bottom:14px;box-shadow:0 2px 12px rgba(0,0,0,0.08);border:1.5px solid #e0f2fe;}
.btn{width:100%;padding:17px;border-radius:14px;border:none;color:#fff;font-size:16px;font-weight:bold;cursor:pointer;margin-bottom:10px;display:block;text-align:center;}
.btn-blue{background:#0e7490;}.btn-green{background:#059669;}.btn-orange{background:#d97706;}.btn-red{background:#b91c1c;}
.btn-gray{background:transparent;border:2px solid #bae6fd;color:#0e7490;}
.inp{width:100%;padding:14px 16px;border-radius:12px;border:2px solid #bae6fd;background:#f0fafa;color:#0c4a6e;font-size:15px;font-weight:bold;outline:none;margin-bottom:10px;}
.txta{width:100%;padding:14px;border-radius:12px;border:2px solid #bae6fd;background:#f0fafa;color:#0c4a6e;font-size:14px;outline:none;resize:vertical;margin-bottom:10px;}
.lbl{color:#0e7490;font-size:13px;font-weight:bold;margin-bottom:6px;display:block;margin-top:4px;}
.menu-btn{background:#fff;border-radius:16px;padding:18px 20px;margin-bottom:12px;border:2.5px solid #bae6fd;cursor:pointer;display:flex;align-items:center;width:100%;}
.q-banner{background:linear-gradient(135deg,#b45309,#d97706);border-radius:18px;padding:18px 20px;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;color:#fff;}
.qcard{border-radius:16px;padding:16px;margin-bottom:12px;background:#fffbeb;border:2.5px solid #f59e0b;}
.mq-pill{padding:11px 15px;border-radius:10px;cursor:pointer;font-size:15px;font-weight:bold;margin:0 8px 8px 0;border:2px solid #6ee7b7;background:#d1fae5;color:#065f46;}
.mq-pill.sel{background:#059669;color:#fff;border-color:#059669;}
.modal-bg{display:none;position:fixed;top:0;right:0;bottom:0;left:0;background:rgba(0,0,0,0.6);z-index:800;align-items:flex-end;justify-content:center;}
.modal-bg.open{display:flex;}
.modal-box{background:#fff;border-radius:24px 24px 0 0;padding:24px;width:100%;max-height:92vh;overflow-y:auto;}
.sync-dot{width:10px;height:10px;border-radius:50%;background:#059669;margin-right:8px;}
.sync-dot.offline{background:#dc2626;}.sync-dot.syncing{background:#f59e0b;}
#toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#0e7490;color:#fff;padding:14px 28px;border-radius:14px;z-index:9999;font-weight:bold;display:none;}
.token{background:#f59e0b;color:#fff;border-radius:50%;width:36px;height:36px;display:inline-flex;align-items:center;justify-content:center;font-weight:bold;margin-right:10px;}
.live-dropdown{background:#fff;border:2px solid #0e7490;border-radius:12px;margin-top:-10px;margin-bottom:10px;display:none;max-height:150px;overflow-y:auto;}
.live-item{padding:12px;border-bottom:1px solid #eee;cursor:pointer;font-weight:bold;}
</style>
</head>
<body>
<div id="toast"></div>

<div id="consult-modal" class="modal-bg">
  <div class="modal-box">
    <h2 style="color:#059669;margin-bottom:10px;">🩺 Consultation</h2>
    <div id="cm-info" style="background:#f0fdf4; padding:15px; border-radius:12px; margin-bottom:15px; font-weight:bold;"></div>
    <div class="lbl">Medicine Days? *</div>
    <div id="cm-med-pills" style="display:flex; flex-wrap:wrap; margin-bottom:10px;"></div>
    <input id="cm-med-custom" class="inp" type="number" placeholder="Custom days" oninput="selCmMed(this.value)">
    <textarea id="cm-notes" class="txta" placeholder="Doctor notes..."></textarea>
    <button id="cm-save-btn" class="btn btn-green" onclick="saveConsultation()" style="opacity:0.4;">Finish & Set Follow-up</button>
    <button class="btn btn-gray" onclick="closeConsultModal()">Cancel</button>
  </div>
</div>

<div id="screen-login" class="screen active">
  <div style="min-height:100vh;background:#0c4a6e;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;text-align:center;">
    <div style="font-size:60px;">🏥</div>
    <div style="color:#fff;font-size:26px;font-weight:bold;margin:10px 0;">Asha Wellness Sanctuary</div>
    <div id="login-buttons" style="width:100%;max-width:400px;margin-top:20px;"></div>
  </div>
</div>

<div id="screen-home" class="screen">
  <div class="hdr hdr-blue"><div class="hdr-title">AWSH Patient Manager</div></div>
  <div class="pad" style="padding:20px;">
    <div style="display:flex;align-items:center;justify-content:space-between;background:#e0f2fe;padding:10px;border-radius:12px;margin-bottom:15px;">
      <div style="display:flex;align-items:center;"><div class="sync-dot" id="sync-dot"></div><span id="sync-status-txt">Cloud Ready</span></div>
      <button style="padding:6px 12px; border-radius:8px; font-size:12px; border:none; background:#0e7490; color:#fff;" onclick="doCloudSync()">Sync Now</button>
    </div>
    <div class="q-banner" onclick="showScreen('queue')">
      <div><div style="font-size:12px;">CONSULTATION QUEUE</div><div id="home-queue-count" style="font-size:24px; font-weight:bold;">0 waiting</div></div>
      <div style="background:#fff; color:#b45309; padding:8px 15px; border-radius:10px; font-weight:bold;">OPEN</div>
    </div>
    <button class="menu-btn" onclick="showScreen('addNew')"><span style="margin-right:10px;">➕</span> Add New Patient</button>
    <button class="menu-btn" onclick="showScreen('search')"><span style="margin-right:10px;">🔍</span> Search & History</button>
    <button class="btn btn-gray" style="margin-top:20px;" onclick="location.reload()">Switch User</button>
  </div>
</div>

<div id="screen-queue" class="screen">
  <div class="hdr hdr-amber"><button class="back-btn" onclick="showScreen('home')">←</button><div class="hdr-title">Queue</div></div>
  <div class="pad" id="queue-list" style="padding:20px;"></div>
</div>

<div id="screen-addNew" class="screen">
  <div class="hdr hdr-green"><button class="back-btn" onclick="showScreen('home')">←</button><div class="hdr-title">Register</div></div>
  <div class="pad" style="padding:20px;">
    <input id="an-uid" class="inp" placeholder="UID (e.g. AWH101)" oninput="this.value=this.value.toUpperCase()">
    <input id="an-name" class="inp" placeholder="Patient Name">
    <input id="an-phone" class="inp" placeholder="Phone">
    <button class="btn btn-green" onclick="saveNewPatient()">Register & Add to Queue</button>
  </div>
</div>

<div id="screen-search" class="screen">
  <div class="hdr hdr-blue"><button class="back-btn" onclick="showScreen('home')">←</button><div class="hdr-title">Search</div></div>
  <div class="pad" style="padding:20px;">
    <input id="search-uid" class="inp" placeholder="UID or Name" oninput="doLiveSearch(this.value)">
    <div id="live-dropdown" class="live-dropdown"></div>
    <button class="btn btn-blue" onclick="doSearch()">Find History</button>
    <div id="search-result" style="margin-top:15px;"></div>
  </div>
</div>

<script>
// --- CONFIG ---
var CLOUD_URL = "https://script.google.com/macros/s/AKfycbzzJiGu32AbR4zhfy6YTQoSzxnpaMDFH4bylWv2qW3Xyk3ImHm-ZxP1Nx-37XdlB0vI/exec";
var STAFF = ["Meenu", "Arvind", "Sandeep", "Neeraj", "Dr. Akash"];
var QDAYS = [3,5,7,10,14,15,21,30];
var patients = [], queue = [], curUser = "", cmMedVal = "", consultPt = null;

// --- HELPERS ---
function todayStr(){ return new Date().toISOString().split('T')[0]; }
function fmt(d){ if(!d) return "-"; var p=d.split("-"); return p[2]+"/"+p[1]+"/"+p[0]; }
function addDays(n){ var d=new Date(); d.setDate(d.getDate()+parseInt(n)); return d.toISOString().split('T')[0]; }
function toast(m){ var e=document.getElementById("toast"); e.textContent=m; e.style.display="block"; setTimeout(()=>e.style.display="none",3000); }

function showScreen(n){ 
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById("screen-"+n).classList.add("active");
  if(n==='home') document.getElementById("home-queue-count").textContent = queue.filter(q=>q.status==='waiting').length + " waiting";
  if(n==='queue') renderQueue();
}

// --- DATA ---
function loadData(){
  patients = JSON.parse(localStorage.getItem("asha_pts_v8") || "[]");
  queue = JSON.parse(localStorage.getItem("asha_q_v8") || "[]").filter(q => q.date === todayStr());
}
function saveAll(){
  localStorage.setItem("asha_pts_v8", JSON.stringify(patients));
  localStorage.setItem("asha_q_v8", JSON.stringify(queue));
}

// --- LOGIN ---
function renderLogin(){
  let h = "";
  STAFF.forEach(s => { h += `<button class="btn btn-blue" style="background:rgba(255,255,255,0.1); border:1px solid #fff;" onclick="doLogin('${s}')">${s}</button>`; });
  document.getElementById("login-buttons").innerHTML = h;
}
function doLogin(n){ curUser=n; showScreen('home'); }

// --- QUEUE ---
function saveNewPatient(){
  let uid = document.getElementById("an-uid").value.trim().toUpperCase();
  let name = document.getElementById("an-name").value.trim();
  if(!uid || !name) return toast("UID and Name required");
  if(patients.find(p=>p.uid===uid)) return toast("UID already exists");
  
  patients.push({ uid, name, phone: document.getElementById("an-phone").value, followup: todayStr(), visits: [] });
  queue.push({ id: Date.now(), uid, status: "waiting", date: todayStr(), token: (queue.length+1) });
  saveAll(); toast("Patient Registered & Queued"); showScreen('home');
}

function renderQueue(){
  let h = "";
  queue.filter(q=>q.status==='waiting').forEach(q => {
    let p = patients.find(pt=>pt.uid===q.uid);
    h += `<div class="qcard"><div style="font-size:18px; font-weight:bold;"><span class="token">${q.token}</span> ${p.name}</div>
    <button class="btn btn-green" style="margin-top:10px; background:#059669;" onclick="openConsultModal('${q.id}')">Complete</button></div>`;
  });
  document.getElementById("queue-list").innerHTML = h || "Queue is empty";
}

function openConsultModal(qid){
  let q = queue.find(x=>x.id==qid);
  let p = patients.find(x=>x.uid===q.uid);
  consultPt = { qid, uid: p.uid };
  document.getElementById("cm-info").textContent = p.name + " (" + p.uid + ")";
  renderCmMedPills();
  document.getElementById("consult-modal").classList.add("open");
}

function renderCmMedPills(sel){
  let h = "";
  QDAYS.forEach(d => {
    let cl = String(d) === String(sel) ? "sel" : "";
    h += `<button class="mq-pill ${cl}" onclick="selCmMed('${d}')">${d}d</button>`;
  });
  document.getElementById("cm-med-pills").innerHTML = h;
}

function selCmMed(v){
  cmMedVal = v;
  document.getElementById("cm-med-custom").value = v;
  document.getElementById("cm-save-btn").style.opacity = "1";
  renderCmMedPills(v);
}

function saveConsultation(){
  if(!cmMedVal) return toast("Enter Days");
  let p = patients.find(x=>x.uid===consultPt.uid);
  let q = queue.find(x=>x.id==consultPt.qid);
  p.followup = addDays(cmMedVal);
  p.visits.unshift({ date: todayStr(), med: cmMedVal, notes: document.getElementById("cm-notes").value });
  q.status = "done";
  saveAll(); closeConsultModal(); showScreen('home'); toast("Saved! Next: " + fmt(p.followup));
}

function closeConsultModal(){ document.getElementById("consult-modal").classList.remove("open"); }

// --- SEARCH ---
function doLiveSearch(val){
  let dd = document.getElementById("live-dropdown");
  if(val.length < 2) { dd.style.display="none"; return; }
  let matches = patients.filter(p => p.name.toUpperCase().includes(val.toUpperCase()) || p.uid.includes(val.toUpperCase())).slice(0,3);
  if(matches.length > 0) {
    dd.innerHTML = matches.map(m => `<div class="live-item" onclick="selectPt('${m.uid}')">${m.name} (${m.uid})</div>`).join("");
    dd.style.display = "block";
  } else { dd.style.display="none"; }
}
function selectPt(uid){ 
  document.getElementById("search-uid").value = uid; 
  document.getElementById("live-dropdown").style.display="none";
  doSearch();
}

function doSearch(){
  let uid = document.getElementById("search-uid").value.toUpperCase();
  let p = patients.find(x=>x.uid===uid);
  if(!p) return document.getElementById("search-result").innerHTML = "Not found";
  let h = `<div class='card'><b>${p.name}</b><br>Next Follow-up: ${fmt(p.followup)}</div>`;
  p.visits.forEach(v => { h += `<div class='card' style='font-size:13px;'>Date: ${fmt(v.date)}<br>Med: ${v.med}d<br>${v.notes}</div>`; });
  document.getElementById("search-result").innerHTML = h;
}

// --- SYNC ---
function doCloudSync(){
  document.getElementById("sync-dot").className = "sync-dot syncing";
  fetch(CLOUD_URL, { method: "POST", mode: "no-cors", body: JSON.stringify({ action: "sync", patients: patients }) })
  .then(() => { document.getElementById("sync-dot").className = "sync-dot"; toast("Sync Successful"); })
  .catch(() => { document.getElementById("sync-dot").className = "sync-dot offline"; toast("Sync Failed"); });
}

window.onload = function() { loadData(); renderLogin(); };
</script>
</body>
</html>
