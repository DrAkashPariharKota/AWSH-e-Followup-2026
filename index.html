<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0e7490">
<title>Asha Wellness - Patient Manager</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:Arial,sans-serif;background:#f0fafa;color:#0c4a6e;min-height:100vh;}
.screen{display:none;min-height:100vh;background:#f0fafa;}
.screen.active{display:block;}
.hdr{padding:18px 20px 14px;display:flex;align-items:center;}
.hdr-blue{background:#0e7490;}.hdr-orange{background:#d97706;}.hdr-green{background:#059669;}
.hdr-purple{background:#4c1d95;}.hdr-teal{background:#0f766e;}.hdr-amber{background:#b45309;}
.back-btn{background:rgba(255,255,255,0.25);border:none;color:#fff;font-size:22px;border-radius:10px;width:40px;height:40px;cursor:pointer;flex-shrink:0;margin-right:12px;}
.hdr-title{color:#fff;font-size:20px;font-weight:bold;}
.card{background:#fff;border-radius:16px;padding:18px;margin-bottom:14px;box-shadow:0 2px 12px rgba(0,0,0,0.08);border:1.5px solid #e0f2fe;}
.btn{width:100%;padding:17px;border-radius:14px;border:none;color:#fff;font-size:16px;font-weight:bold;cursor:pointer;margin-bottom:10px;display:block;text-align:center;}
.btn-blue{background:#0e7490;}.btn-green{background:#059669;}.btn-orange{background:#d97706;}.btn-red{background:#b91c1c;}
.inp{width:100%;padding:14px 16px;border-radius:12px;border:2px solid #bae6fd;background:#f0fafa;color:#0c4a6e;font-size:15px;font-weight:bold;outline:none;margin-bottom:10px;}
.txta{width:100%;padding:14px;border-radius:12px;border:2px solid #bae6fd;background:#f0fafa;color:#0c4a6e;font-size:14px;outline:none;resize:vertical;margin-bottom:10px;}
.lbl{color:#0e7490;font-size:13px;font-weight:bold;margin-bottom:6px;display:block;margin-top:4px;}
.menu-btn{background:#fff;border-radius:16px;padding:18px 20px;margin-bottom:12px;border:2.5px solid #bae6fd;cursor:pointer;display:flex;align-items:center;width:100%;}
.q-banner{background:linear-gradient(135deg,#b45309,#d97706);border-radius:18px;padding:18px 20px;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;color:#fff;}
.qcard{border-radius:16px;padding:16px;margin-bottom:12px;background:#fffbeb;border:2.5px solid #f59e0b;}
.mq-pill{padding:11px 15px;border-radius:10px;cursor:pointer;font-size:15px;font-weight:bold;margin:0 8px 8px 0;border:2px solid #6ee7b7;background:#d1fae5;color:#065f46;}
.mq-pill.sel{background:#059669;color:#fff;border-color:#059669;}
.modal-bg{display:none;position:fixed;top:0;right:0;bottom:0;left:0;background:rgba(0,0,0,0.6);z-index:800;align-items:flex-end;justify-content:center;}
.modal-bg.open{display:flex;}
.modal-box{background:#fff;border-radius:24px 24px 0 0;padding:24px;width:100%;max-height:92vh;overflow-y:auto;}
.sync-dot{width:10px;height:10px;border-radius:50%;background:#059669;margin-right:8px;}
.sync-dot.offline{background:#dc2626;}.sync-dot.syncing{background:#f59e0b;}
#toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#0e7490;color:#fff;padding:14px 28px;border-radius:14px;z-index:9999;font-weight:bold;display:none;}
.token{background:#f59e0b;color:#fff;border-radius:50%;width:36px;height:36px;display:inline-flex;align-items:center;justify-content:center;font-weight:bold;margin-right:10px;}
.login-btn{width:100%;padding:20px;border-radius:18px;color:#fff;font-size:18px;font-weight:bold;cursor:pointer;display:flex;align-items:center;margin-bottom:12px;background:rgba(255,255,255,0.1);border:2.5px solid #ccc;}
</style>
</head>
<body>
<div id="toast"></div>

<div id="consult-modal" class="modal-bg">
  <div class="modal-box">
    <h2 style="color:#059669;margin-bottom:10px;">🩺 Consultation</h2>
    <div id="cm-info" style="background:#f0fdf4; padding:15px; border-radius:12px; margin-bottom:15px;"></div>
    <div class="lbl">Medicine Days? *</div>
    <div id="cm-med-pills" style="display:flex; flex-wrap:wrap; margin-bottom:10px;"></div>
    <input id="cm-med-custom" class="inp" type="number" placeholder="Custom days" oninput="applyConsultMed(this.value)">
    <textarea id="cm-notes" class="txta" placeholder="Doctor notes..."></textarea>
    <button id="cm-save-btn" class="btn btn-green" onclick="saveConsultation()" style="opacity:0.4;">Finish & Set Follow-up</button>
    <button class="btn btn-red" style="background:#64748b" onclick="closeConsultModal()">Cancel</button>
  </div>
</div>

<div id="screen-login" class="screen active">
  <div style="min-height:100vh;background:#0c4a6e;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;text-align:center;">
    <div style="font-size:60px;">🏥</div>
    <div style="color:#fff;font-size:26px;font-weight:bold;margin:10px 0;">Asha Wellness Sanctuary</div>
    <div id="login-buttons" style="width:100%;max-width:400px;margin-top:20px;"></div>
  </div>
</div>

<div id="screen-home" class="screen">
  <div class="hdr hdr-blue"><div style="color:#fff; font-weight:bold;">Asha Wellness Sanctuary</div></div>
  <div class="pad" style="padding:20px;">
    <div style="display:flex;align-items:center;justify-content:space-between;background:#e0f2fe;padding:10px;border-radius:12px;margin-bottom:15px;">
      <div style="display:flex;align-items:center;"><div class="sync-dot" id="sync-dot"></div><span id="sync-status-txt">Cloud Ready</span></div>
      <button class="btn-blue" style="padding:6px 12px; border-radius:8px; font-size:12px; background:#0e7490; color:#fff; border:none;" onclick="doCloudSync()">Sync Now</button>
    </div>
    <div class="q-banner" onclick="showScreen('queue')">
      <div><div style="font-size:12px;">CONSULTATION QUEUE</div><div id="home-queue-count" style="font-size:24px; font-weight:bold;">0 waiting</div></div>
      <div style="background:#fff; color:#b45309; padding:8px 15px; border-radius:10px; font-weight:bold;">OPEN</div>
    </div>
    <button class="menu-btn" onclick="showScreen('addNew')">➕ Add New Patient</button>
    <button class="menu-btn" onclick="showScreen('search')">🔍 Search History</button>
    <button class="btn btn-red" style="background:#64748b; margin-top:20px;" onclick="location.reload()">Switch User</button>
  </div>
</div>

<div id="screen-queue" class="screen">
  <div class="hdr hdr-amber"><button class="back-btn" onclick="showScreen('home')">←</button><div class="hdr-title">Queue</div></div>
  <div class="pad" id="queue-list" style="padding:20px;"></div>
</div>

<div id="screen-addNew" class="screen">
  <div class="hdr hdr-green"><button class="back-btn" onclick="showScreen('home')">←</button><div class="hdr-title">Register</div></div>
  <div class="pad" style="padding:20px;">
    <input id="an-uid" class="inp" placeholder="UID (e.g. AWH101)" oninput="this.value=this.value.toUpperCase()">
    <input id="an-name" class="inp" placeholder="Patient Name">
    <input id="an-phone"
