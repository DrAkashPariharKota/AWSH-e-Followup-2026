<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0e7490">
<title>Asha Wellness - Patient Manager Pro</title>
<style>
/* CORE STYLES */
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:Arial,sans-serif;background:#f0fafa;color:#0c4a6e;min-height:100vh;}
.screen{display:none;min-height:100vh;background:#f0fafa;}
.screen.active{display:block;}
.hdr{padding:18px 20px 14px;display:flex;align-items:center;}
.hdr-blue{background:#0e7490;}.hdr-amber{background:#b45309;}.hdr-green{background:#059669;}
.back-btn{background:rgba(255,255,255,0.25);border:none;color:#fff;font-size:22px;border-radius:10px;width:40px;height:40px;cursor:pointer;flex-shrink:0;margin-right:12px;}
.hdr-title{color:#fff;font-size:20px;font-weight:bold;}
.card{background:#fff;border-radius:16px;padding:18px;margin-bottom:14px;box-shadow:0 2px 12px rgba(0,0,0,0.08);border:1.5px solid #e0f2fe;}
.btn{width:100%;padding:17px;border-radius:14px;border:none;color:#fff;font-size:16px;font-weight:bold;cursor:pointer;margin-bottom:10px;display:block;text-align:center;}
.btn-blue{background:#0e7490;}.btn-green{background:#059669;}.btn-gray{background:transparent;border:2px solid #bae6fd;color:#0e7490;}
.inp{width:100%;padding:14px 16px;border-radius:12px;border:2px solid #bae6fd;background:#f0fafa;color:#0c4a6e;font-size:15px;font-weight:bold;outline:none;margin-bottom:10px;}
.txta{width:100%;padding:14px;border-radius:12px;border:2px solid #bae6fd;background:#f0fafa;color:#0c4a6e;font-size:14px;outline:none;resize:vertical;margin-bottom:10px;}
.lbl{color:#0e7490;font-size:13px;font-weight:bold;margin-bottom:6px;display:block;margin-top:4px;}
.menu-btn{background:#fff;border-radius:16px;padding:18px 20px;margin-bottom:12px;border:2.5px solid #bae6fd;cursor:pointer;display:flex;align-items:center;width:100%;}
.menu-icon{font-size:30px;margin-right:14px;}
.q-banner{background:linear-gradient(135deg,#b45309,#d97706);border-radius:18px;padding:18px 20px;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;color:#fff;}
.qcard{border-radius:16px;padding:16px;margin-bottom:12px;background:#fffbeb;border:2.5px solid #f59e0b;}
.mq-pill{padding:11px 15px;border-radius:10px;cursor:pointer;font-size:15px;font-weight:bold;margin:0 8px 8px 0;border:2px solid #6ee7b7;background:#d1fae5;color:#065f46;}
.mq-pill.sel{background:#059669;color:#fff;border-color:#059669;}
.sync-bar{display:flex;align-items:center;justify-content:space-between;background:#e0f2fe;border-radius:12px;padding:10px 14px;margin-bottom:14px;}
.sync-dot{width:10px;height:10px;border-radius:50%;background:#059669;margin-right:8px;}
.sync-dot.offline{background:#dc2626;}.sync-dot.syncing{background:#f59e0b;}
#toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#0e7490;color:#fff;padding:14px 28px;border-radius:14px;z-index:9999;font-weight:bold;display:none;}
.modal-bg{display:none;position:fixed;top:0;right:0;bottom:0;left:0;background:rgba(0,0,0,0.6);z-index:800;align-items:flex-end;justify-content:center;}
.modal-bg.open{display:flex;}
.modal-box{background:#fff;border-radius:24px 24px 0 0;padding:24px;width:100%;max-height:92vh;overflow-y:auto;}
.token{background:#f59e0b;color:#fff;border-radius:50%;width:30px;height:30px;display:inline-flex;align-items:center;justify-content:center;margin-right:10px;font-weight:bold;}
</style>
</head>
<body>

<div id="toast"></div>

<div id="consult-modal" class="modal-bg">
  <div class="modal-box">
    <div style="font-size:21px;font-weight:bold;color:#059669;margin-bottom:12px;">🩺 Complete Consultation</div>
    <div id="cm-patient-info" style="background:#f0fdf4; padding:15px; border-radius:12px; margin-bottom:15px;">
        Token #<span id="cm-token"></span>: <b id="cm-name"></b> (<span id="cm-meta"></span>)
    </div>
    <div class="lbl">Medicine Days? *</div>
    <div id="cm-med-pills" style="display:flex; flex-wrap:wrap; margin-bottom:10px;"></div>
    <input id="cm-med-custom" class="inp" type="number" placeholder="Custom days" oninput="selCmMedDays(this.value)">
    <textarea id="cm-notes" class="txta" placeholder="Doctor notes..."></textarea>
    <button id="cm-save-btn" class="btn btn-green" onclick="saveConsultation()" style="opacity:0.4;">Finish & Set Follow-up</button>
    <button class="btn btn-gray" onclick="closeConsultModal()">Cancel</button>
  </div>
</div>

<div id="screen-login" class="screen active">
  <div style="min-height:100vh;background:#0c4a6e;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;text-align:center;">
    <div style="font-size:60px;">🏥</div>
    <div style="color:#fff;font-size:26px;font-weight:bold;margin:10px 0;">Asha Wellness Sanctuary</div>
    <div id="login-buttons" style="width:100%;max-width:400px;margin-top:20px;"></div>
  </div>
</div>

<div id="screen-home" class="screen">
  <div class="hdr hdr-blue"><div style="color:#fff; font-weight:bold;">Asha Wellness Sanctuary</div></div>
  <div class="pad" style="padding:20px;">
    <div class="sync-bar">
      <div style="display:flex;align-items:center;"><div class="sync-dot" id="sync-dot"></div><span id="sync-status-txt">Cloud Ready</span></div>
      <button style="padding:6px 12px; border-radius:8px; font-size:12px; border:none; background:#0e7490; color:#fff;" onclick="doCloudSync()">Sync Now</button>
    </div>
    <div class="q-banner" onclick="showScreen('queue')">
      <div><div style="font-size:12px;">CONSULTATION QUEUE</div><div id="home-queue-count" style="font-size:24px; font-weight:bold;">0 waiting</div></div>
      <div style="background:#fff; color:#b45309; padding:8px 15px; border-radius:10px; font-weight:bold;">OPEN</div>
    </div>
    <button class="menu-btn" onclick="showScreen('addNew')"><div class="menu-icon">➕</div><div><div class="menu-title">Add New Patient</div></div></button>
    <button class="menu-btn" onclick="showScreen('search')"><div class="menu-icon">🔍</div><div><div class="menu-title">Search & History</div></div></button>
    <button class="btn btn-gray" onclick="switchUser()" style="margin-top:20px;">Switch User</button>
  </div>
</div>

<div id="screen-queue" class="screen">
  <div class="hdr hdr-amber"><button class="back-btn" onclick="showScreen('home')">←</button><div class="hdr-title">Consultation Queue</div></div>
  <div class="pad" id="queue-list" style="padding:20px;"></div>
</div>

<div id="screen-addNew" class="screen">
  <div class="hdr hdr-green"><button class="back-btn" onclick="showScreen('home')">←</button><div class="hdr-title">New Registration</div></div>
  <div class="pad" style="padding:20px;">
    <input id="an-uid" class="inp" placeholder="UID (e.g. AWH001)" oninput="this.value=this.value.toUpperCase()">
    <input id="an-name" class="inp" placeholder="Patient Name">
    <input id="an-phone" class="inp" type="tel" placeholder="Phone Number">
    <div class="lbl">Add to Queue?</div>
    <div style="display:flex; margin-bottom:15px;">
        <button id="an-q-yes" class="btn-green mq-pill sel" style="flex:1" onclick="selectAnQueue('yes')">Yes</button>
        <button id="an-q-no" class="mq-pill" style="flex:1" onclick="selectAnQueue('no')">No</button>
    </div>
    <button class="btn btn-green" onclick="saveNewPatient()">Register Patient</button>
  </div>
</div>

<div id="screen-search" class="screen">
  <div class="hdr hdr-blue"><button class="back-btn" onclick="showScreen('home')">←</button><div class="hdr-title">Search Patient</div></div>
  <div class="pad" style="padding:20px;">
    <input id="search-uid" class="inp" placeholder="Enter UID" oninput="this.value=this.value.toUpperCase()">
    <button class="btn btn-blue" onclick="doSearch()">Find History</button>
    <div id="search-result" style="margin-top:15px;"></div>
  </div>
</div>

<script>
// --- CONFIG ---
var CLOUD_URL = "https://script.google.com/macros/s/AKfycbxHN42QU-aSByIeJZet9bgJhzIFSrZX0Vn2yWe8qcXkEasBCl0MYIuqoxu73n_Na6sQ/exec";
var SK="asha_pts_v8", QK="asha_queue_v8";
var QDAYS = [3,5,7,10,14,15,21,30];
var STAFF = [
  {name:"Meenu", icon:"M", color:"#f472b6"},
  {name:"Arvind", icon:"A", color:"#60a5fa"},
  {name:"Sandeep", icon:"S", color:"#34d399"},
  {name:"Neeraj", icon:"N", color:"#fbbf24"},
  {name:"Dr. Akash", icon:"D", color:"#a78bfa", isAdmin:true}
];

// --- STATE ---
var patients = [], queue = [], curUser = null;
var currentSelectedCmMedDays = "", consultPt = null;

// --- HELPERS ---
function todayStr(){ return new Date().toISOString().split('T')[0]; }
function addDays(n){ var d=new Date(); d.setDate(d.getDate()+parseInt(n)); return d.toISOString().split('T')[0]; }
function toast(m){ var e=document.getElementById("toast"); e.textContent=m; e.style.display="block"; setTimeout(()=>e.style.display="none",3000); }

function showScreen(n){ 
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById("screen-"+n).classList.add("active");
  if(n==='home') renderHome();
  if(n==='queue') renderQueue();
}

// --- DATA ---
function loadData(){
  try {
    patients = JSON.parse(localStorage.getItem(SK) || "[]");
    queue = JSON.parse(localStorage.getItem(QK) || "[]").filter(q => q.date === todayStr());
  } catch(e) { console.error("Load failed"); }
}
function savePts() { localStorage.setItem(SK, JSON.stringify(patients)); }
function saveQueue() { localStorage.setItem(QK, JSON.stringify(queue)); }

// --- LOGIN ---
function renderLogin(){
  let h = "";
  STAFF.forEach(s => {
    h += `<button class="btn" style="background:${s.color}" onclick="doLogin('${s.name}')">${s.icon} ${s.name}</button>`;
  });
  document.getElementById("login-buttons").innerHTML = h;
}
function doLogin(n){ curUser=n; showScreen('home'); }
function switchUser(){ curUser=null; showScreen('login'); }

// --- QUEUE & REGISTRATION ---
function selectAnQueue(v){
  if(v==='yes'){document.getElementById("an-q-yes").classList.add("sel");document.getElementById("an-q-no").classList.remove("sel");}
  else {document.getElementById("an-q-no").classList.add("sel");document.getElementById("an-q-yes").classList.remove("sel");}
}

function saveNewPatient(){
  let uid = document.getElementById("an-uid").value.trim().toUpperCase();
  let name = document.getElementById("an-name").value.trim();
  if(!uid || !name) return toast("Fill UID and Name");
  if(patients.find(p=>p.uid===uid)) return toast("UID already exists");
  
  patients.push({ uid, name, phone: document.getElementById("an-phone").value, followupDate: todayStr(), visits: [], status:"pending" });
  savePts();

  if(document.getElementById("an-q-yes").classList.contains("sel")) {
    let token = queue.length > 0 ? Math.max(...queue.map(q=>q.token)) + 1 : 1;
    queue.push({ id: "q"+Date.now(), uid, token, status: "waiting", date: todayStr() });
    saveQueue();
    toast("Registered & Added to Queue");
    showScreen('queue');
  } else {
    toast("Registered Successfully");
    showScreen('home');
  }
